version: 2

models:
  - name: int_payment_cycle_dates
    description: >
      One row per payment, with the 28-day consumption cycle it opens. Sourced
      from stg_payments. The cycle starts at the payment timestamp and ends
      exactly 28 days later. Each payment is also numbered by its order within
      the student's lifetime, earliest first. Grain: payment_id.
    columns:
      - name: student_id
        description: Foreign key to stg_students. The student who made the payment.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_students')
                field: student_id
      - name: payment_id
        description: Primary key. Unique payment identifier.
        data_tests:
          - unique
          - not_null
      - name: start_date
        description: Timestamp the cycle starts, equal to the payment timestamp.
        data_tests:
          - not_null
      - name: end_date
        description: Timestamp the cycle ends, exactly 28 days after the payment timestamp.
        data_tests:
          - not_null
      - name: lifetime_payment_number
        description: >
          Sequential number of this payment within the student's lifetime,
          ordered by payment timestamp ascending. The earliest payment per
          student is 1.
        data_tests:
          - not_null
      - name: total_hours_purchased
        description: Total hours of credit purchased in this payment.
        data_tests:
          - not_null
      - name: price_per_hour_usd
        description: Price per hour in USD for this payment.
        data_tests:
          - not_null

  - name: int_lesson_cycle_mapping
    description: >
      Maps each lesson from stg_lessons to the payment cycle from
      int_payment_cycle_dates it falls within. A lesson belongs to a cycle when
      it was booked by the same student and its booking timestamp lands on or
      after the cycle start and before the cycle end (the 28-day window). Built
      with a left join, so lessons booked outside any cycle are kept with null
      cycle fields. Grain: lesson_id.
    columns:
      - name: lesson_id
        description: Primary key. Unique lesson identifier.
        data_tests:
          - unique
          - not_null
      - name: student_id
        description: Foreign key to stg_students. The student who booked the lesson.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_students')
                field: student_id
      - name: booking_ts
        description: Timestamp the lesson was booked.
        data_tests:
          - not_null
      - name: hours_booked
        description: Duration of the booked lesson in hours.
        data_tests:
          - not_null
      - name: payment_id
        description: >
          Foreign key to int_payment_cycle_dates. The payment whose cycle
          contains this lesson. Null when the lesson falls outside every cycle.
      - name: lifetime_payment_number
        description: >
          Lifetime order of the payment cycle this lesson falls within, earliest
          payment per student being 1. Null when unmapped.
      - name: start_date
        description: >
          Timestamp the matched payment cycle starts (the payment timestamp).
          Null when unmapped.
      - name: end_date
        description: >
          Timestamp the matched payment cycle ends, exactly 28 days after the
          payment. Null when unmapped.

  - name: int_cycle_usage
    description: >
      One row per payment cycle, summarising hourly consumption. Combines
      int_payment_cycle_dates (cycle metadata) and int_lesson_cycle_mapping
      (hours used) to compare hours purchased against hours used within each
      28-day cycle, and buckets the cycle for cohorting. Grain: payment_id.
    columns:
      - name: payment_id
        description: Primary key. Identifies the cycle (one cycle per payment).
        data_tests:
          - unique
          - not_null
      - name: student_id
        description: Foreign key to stg_students. The student who owns the cycle.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_students')
                field: student_id
      - name: start_date
        description: Timestamp the cycle starts (the payment timestamp).
        data_tests:
          - not_null
      - name: end_date
        description: Timestamp the cycle ends, exactly 28 days after the payment.
        data_tests:
          - not_null
      - name: lifetime_payment_number
        description: >
          Lifetime order of this cycle for the student, earliest payment being 1.
        data_tests:
          - not_null
      - name: lifetime_payment_number_bucket
        description: >
          Lifetime cycle order bucketed for cohorting: the lifetime payment
          number as text, with everything at 5 or above grouped as '5+'.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['1', '2', '3', '4', '5+']
      - name: is_cycle_ended
        description: >
          Binary flag: 1 if the cycle has ended (end_date is in the past), else 0.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1]
      - name: total_hours_purchased
        description: Total hours of credit purchased in the payment that opened this cycle.
        data_tests:
          - not_null
      - name: total_hours_used
        description: >
          Total hours booked within the cycle window. Zero when no lessons were
          booked in the cycle.
        data_tests:
          - not_null
      - name: pct_hours_used
        description: >
          Share of purchased hours consumed in the cycle: total_hours_used
          divided by total_hours_purchased. Null if no hours were purchased.
      - name: price_per_hour_usd
        description: Price per hour in USD for the payment that opened this cycle.
        data_tests:
          - not_null
      - name: price_bucket
        description: >
          Price-per-hour band of the cycle: '0-10', '10-15', '15-20' or '20+'.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['0-10', '10-15', '15-20', '20+']

  - name: int_cycle_revenue_completed
    description: >
      One row per completed cycle (is_cycle_ended = 1), with the revenue it
      generated. Sourced from int_cycle_usage. Usage revenue is the platform's
      20% take on the value of hours actually used; breakage revenue is the USD
      value of the hours purchased but left unused. Grain: payment_id.
    columns:
      - name: payment_id
        description: Primary key. Identifies the completed cycle (one cycle per payment).
        data_tests:
          - unique
          - not_null
      - name: student_id
        description: Foreign key to stg_students. The student who owns the cycle.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_students')
                field: student_id
      - name: lifetime_payment_number
        description: >
          Lifetime order of this cycle for the student, earliest payment being 1.
        data_tests:
          - not_null
      - name: lifetime_payment_number_bucket
        description: >
          Lifetime cycle order bucketed for cohorting, with 5 or above as '5+'.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['1', '2', '3', '4', '5+']
      - name: price_per_hour_usd
        description: Price per hour in USD for the payment that opened this cycle.
        data_tests:
          - not_null
      - name: price_bucket
        description: >
          Price-per-hour band of the cycle: '0-10', '10-15', '15-20' or '20+'.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['0-10', '10-15', '15-20', '20+']
      - name: usage_revenue_usd
        description: >
          Platform revenue from consumed hours, rounded to cents: 20% of the
          value of hours used (total_hours_used * price_per_hour_usd * 0.2).
        data_tests:
          - not_null
      - name: breakage_revenue_usd
        description: >
          USD value of unused hours at the end of the cycle, rounded to cents:
          (total_hours_purchased - total_hours_used) * price_per_hour_usd.
        data_tests:
          - not_null
      - name: pct_hours_used
        description: >
          Share of purchased hours consumed in the cycle, carried through from
          int_cycle_usage.

  - name: int_cohort_breakage_avg
    description: >
      Completed cycles aggregated into cohorts to compare hourly usage across
      segments. Each row is a unique combination of lifetime payment bucket,
      price bucket and student persona, sourced from int_cycle_revenue_completed
      joined to stg_students. Reports the average share of hours used and the
      number of cycles in the cohort. Grain: lifetime_payment_number_bucket +
      price_bucket + persona.
    columns:
      - name: lifetime_payment_number_bucket
        description: >
          Lifetime cycle order bucketed for cohorting, with 5 or above as '5+'.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['1', '2', '3', '4', '5+']
      - name: price_bucket
        description: >
          Price-per-hour band of the cycle: '0-10', '10-15', '15-20' or '20+'.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['0-10', '10-15', '15-20', '20+']
      - name: persona
        description: >
          Student behavioural segment from stg_students. Null when the student
          has no matching dimension row.
      - name: avg_pct_hours_used
        description: Average pct_hours_used across the completed cycles in the cohort.
        data_tests:
          - not_null
      - name: total_cycles_in_cohort
        description: Number of completed cycles in the cohort.
        data_tests:
          - not_null

  - name: int_cycle_revenue_predicted
    description: >
      One row per cycle with predicted hours used and predicted revenue. Sourced
      from int_cycle_usage and the cohort averages in int_cohort_breakage_avg.
      Predicted usage takes the greater of the cycle's actual share of hours used
      and its cohort's average share. Revenue then applies the 20% platform take to
      the predicted used hours, with the remainder counted as breakage.
      Grain: payment_id.
    columns:
      - name: payment_id
        description: Primary key. Identifies the cycle (one cycle per payment).
        data_tests:
          - unique
          - not_null
      - name: start_date
        description: Timestamp the cycle starts (the payment timestamp).
        data_tests:
          - not_null
      - name: end_date
        description: Timestamp the cycle ends, exactly 28 days after the payment.
        data_tests:
          - not_null
      - name: total_hours_purchased
        description: Total hours of credit purchased in the payment that opened this cycle.
        data_tests:
          - not_null
      - name: predicted_total_hours_used
        description: >
          Predicted hours consumed in the cycle: predicted share of hours used
          multiplied by total_hours_purchased.
        data_tests:
          - not_null
      - name: predicted_usage_revenue
        description: >
          Predicted platform revenue from consumed hours: 20% of the value of the
          predicted used hours (predicted_total_hours_used * price_per_hour_usd * 0.2).
        data_tests:
          - not_null
      - name: predicted_breakage_revenue
        description: >
          Predicted USD value of unused hours: the full value of purchased hours
          (total_hours_purchased * price_per_hour_usd) less predicted_usage_revenue.
        data_tests:
          - not_null
